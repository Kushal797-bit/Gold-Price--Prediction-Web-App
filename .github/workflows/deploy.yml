name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd Gold-Price--Prediction-Web-App

            git pull

            sudo docker stop gold-container || true

            sudo docker rm gold-container || true

            sudo docker build -t gold-price-app .

            sudo docker run -d -p 5000:5000 --name gold-container gold-price-app