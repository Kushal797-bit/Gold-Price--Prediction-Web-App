<!DOCTYPE html>
<html>

<head>
    <title>Gold Price Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Gold Price Prediction</h1>

        <form action="/predict" method="POST">

            <input type="text" name="SPX" placeholder="Enter SPX" required>

            <input type="text" name="USO" placeholder="Enter USO" required>

            <input type="text" name="SLV" placeholder="Enter SLV" required>

            <input type="text" name="EURUSD" placeholder="Enter EUR/USD" required>

            <button type="submit">Predict</button>

        </form>

        <h2>{{ prediction_text }}</h2>

    </div>

</body>

</html>
